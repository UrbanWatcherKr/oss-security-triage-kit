name: Maintainer Copilot

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dry-run-artifacts:
    name: Generate maintainer artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Create pull request input
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });
            const input = {
              repository: `${owner}/${repo}`,
              number: pr.number,
              title: pr.title,
              author: pr.user?.login ?? "unknown",
              body: pr.body ?? "",
              files: files.map((file) => ({
                path: file.filename,
                additions: file.additions,
                deletions: file.deletions
              })),
              commits: commits.map((commit) => commit.commit.message.split("\n")[0]),
              labels: pr.labels.map((label) => typeof label === "string" ? label : label.name)
            };
            fs.writeFileSync("mck-pr-input.json", JSON.stringify(input, null, 2));

      - name: Generate pull request artifact
        if: github.event_name == 'pull_request'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            node dist/cli.js pr-summary --input mck-pr-input.json --output mck-pr-summary.md
          else
            node dist/cli.js pr-summary --input mck-pr-input.json --output mck-pr-summary.md --dry-run
          fi

      - name: Generate sample maintainer artifacts
        if: github.event_name == 'workflow_dispatch'
        run: |
          node dist/cli.js pr-summary --input examples/pr.json --output mck-pr-summary.md --dry-run
          node dist/cli.js issue-triage --input examples/issue.json --output mck-issue-triage.md --dry-run
          node dist/cli.js release-notes --input examples/release.json --output mck-release-notes.md --dry-run

      - name: Upload pull request artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: maintainer-copilot-pr-summary
          path: |
            mck-pr-summary.md
            mck-pr-input.json

      - name: Upload sample artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: maintainer-copilot-samples
          path: |
            mck-pr-summary.md
            mck-issue-triage.md
            mck-release-notes.md
