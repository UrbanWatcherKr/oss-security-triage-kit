name: OSS Security Triage

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  defensive-security-artifacts:
    name: Generate defensive security artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Create pull request risk input
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });
            const sensitivePatterns = [
              /auth/i,
              /session/i,
              /cookie/i,
              /token/i,
              /secret/i,
              /permission/i,
              /middleware/i,
              /dependenc/i,
              /package-lock\.json$/,
              /package\.json$/
            ];
            const securitySensitivePaths = files
              .map((file) => file.filename)
              .filter((filename) => sensitivePatterns.some((pattern) => pattern.test(filename)));
            const dependencyChanges = files
              .filter((file) => /(^|\/)(package-lock\.json|package\.json|pnpm-lock\.yaml|yarn\.lock)$/.test(file.filename))
              .map((file) => `${file.filename} changed`);
            const input = {
              repository: `${owner}/${repo}`,
              number: pr.number,
              title: pr.title,
              author: pr.user?.login ?? "unknown",
              body: pr.body ?? "",
              files: files.map((file) => ({
                path: file.filename,
                additions: file.additions,
                deletions: file.deletions,
                riskNotes: securitySensitivePaths.includes(file.filename) ? "Security-sensitive path changed." : undefined
              })),
              dependencyChanges,
              securitySensitivePaths,
              labels: pr.labels.map((label) => typeof label === "string" ? label : label.name)
            };
            fs.writeFileSync("ostk-pr-risk.json", JSON.stringify(input, null, 2));

      - name: Generate pull request risk artifact
        if: github.event_name == 'pull_request'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            node dist/cli.js pr-risk-review --input ostk-pr-risk.json --output ostk-pr-risk-review.md
          else
            node dist/cli.js pr-risk-review --input ostk-pr-risk.json --output ostk-pr-risk-review.md --dry-run
          fi

      - name: Generate sample security artifacts
        if: github.event_name == 'workflow_dispatch'
        run: |
          node dist/cli.js security-triage --input examples/security-report.json --output ostk-security-triage.md --dry-run
          node dist/cli.js pr-risk-review --input examples/pr-risk.json --output ostk-pr-risk-review.md --dry-run
          node dist/cli.js disclosure-draft --input examples/disclosure.json --output ostk-disclosure-draft.md --dry-run

      - name: Upload pull request security artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: oss-security-triage-pr-risk
          path: |
            ostk-pr-risk-review.md
            ostk-pr-risk.json

      - name: Upload sample security artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: oss-security-triage-samples
          path: |
            ostk-security-triage.md
            ostk-pr-risk-review.md
            ostk-disclosure-draft.md
